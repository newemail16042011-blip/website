<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Eid Mubarak">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="shortcut icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="msapplication-TileImage" content="favicon.png">
    <title>Sorry - Eid Mubarak</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #000000, #0a0a1a);
            min-height: 100vh;
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            position: relative;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: none;
        }

        /* Prevent horizontal scroll */
        html {
            overflow-x: hidden;
            max-width: 100vw;
        }

        /* Stars Container */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: var(--min-opacity); transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Shooting Stars */
        .shooting-star {
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, white, transparent);
            animation: shoot var(--shoot-duration) linear infinite;
            opacity: 0;
        }

        @keyframes shoot {
            0% { transform: translateX(0) translateY(0); opacity: 1; }
            100% { transform: translateX(300px) translateY(200px); opacity: 0; }
        }

        /* Clouds */
        .clouds-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            filter: blur(20px);
            animation: float-cloud var(--cloud-duration) ease-in-out infinite;
        }

        @keyframes float-cloud {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(50px); }
        }

        /* Moon */
        .moon-container {
            position: fixed;
            top: 8%;
            right: 10%;
            z-index: 10;
            cursor: pointer;
            transition: transform 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .moon-container:active {
            transform: scale(0.95);
        }

        .moon {
            width: 35vw;
            max-width: 180px;
            height: 35vw;
            max-height: 180px;
            border-radius: 50% 48% 52% 47% / 48% 52% 47% 50%;
            background: radial-gradient(circle at 30% 30%, #fff 0%, #f5f5f5 40%, #e8e8e8 100%);
            box-shadow: 
                0 0 50px rgba(255, 255, 255, 0.5),
                0 0 100px rgba(255, 255, 255, 0.3),
                inset -20px -20px 50px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            animation: moon-shape 8s ease-in-out infinite;
        }

        @keyframes moon-shape {
            0%, 100% { border-radius: 50% 48% 52% 47% / 48% 52% 47% 50%; }
            25% { border-radius: 47% 50% 48% 52% / 50% 47% 52% 48%; }
            50% { border-radius: 52% 47% 50% 48% / 47% 48% 50% 52%; }
            75% { border-radius: 48% 52% 47% 50% / 52% 50% 48% 47%; }
        }

        .moon-text {
            text-align: center;
            margin-top: 15px;
            color: white;
            font-size: clamp(16px, 3vw, 16px);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            animation: pulse-text 2s ease-in-out infinite;
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* Glow effect around moon */
        .moon-glow {
            position: absolute;
            top: -10%;
            left: -10%;
            right: -10%;
            bottom: -10%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
            animation: glow-pulse 3s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        /* Message Text */
        .message-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        .sad-heart {
            font-size: clamp(15px, 15vw, 80px);
            margin-bottom: 10px;
        }

        h1 {
            font-size: clamp(1rem, 8vw, 48px);
            color: #ff69b4;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.5);
            margin-bottom: 15px;
        }

        p {
            font-size: clamp(1rem, 4vw, 24px);
            color: #e0e0e0;
        }

        /* Notification Modal */
        .notification-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .notification-overlay.show {
            display: flex;
        }

        .notification-box {
            background: linear-gradient(135deg, #2d1b4e 0%, #1a1035 100%);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 50px rgba(147, 112, 219, 0.4);
            max-width: 350px;
            width: 100%;
            animation: pop-in 0.5s ease;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
        }
        
        .loading-overlay.show {
            display: flex;
        }
        
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #9370db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: white;
            margin-top: 20px;
            font-size: 18px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @keyframes pop-in {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .notification-text {
            color: white;
            font-size: clamp(1rem, 5vw, 20px);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .heart {
            color: #9370db;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 35px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            min-width: 100px;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-yes {
            background: linear-gradient(135deg, #9370db, #8b5cf6);
            color: white;
            box-shadow: 0 0 20px rgba(147, 112, 219, 0.5);
        }

        .btn-yes:active {
            transform: scale(0.95);
        }

        /* Mobile Responsive Styles */
        @media screen and (max-width: 480px) {
            .moon-container {
                top: 6%;
                right: 5%;
            }

            .moon {
                width: 40vw;
                height: 40vw;
            }

            .moon-text {
                font-size: 14px;
            }

            .notification-text {
                font-size: 18px;
            }

            .btn {
                padding: 12px 30px;
                font-size: 16px;
            }
        }

        @media screen and (min-width: 768px) {
            .moon-container {
                top: 10%;
                right: 15%;
            }

            .moon {
                width: 200px;
                height: 200px;
            }

            .moon-text {
                font-size: 18px;
            }

            .sad-heart {
                font-size: 80px;
            }

            h1 {
                font-size: 48px;
            }

            p {
                font-size: 24px;
            }

            .notification-text {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <!-- Stars -->
    <div class="stars-container" id="stars"></div>
    
    <!-- Shooting Stars -->
    <div class="shooting-stars" id="shooting-stars"></div>
    
    <!-- Clouds -->
    <div class="clouds-container" id="clouds"></div>
    
    <!-- Moon -->
    <div class="moon-container" onclick="goToMain()">
        <div class="moon-glow"></div>
        <div class="moon">
        </div>
        <p class="moon-text">🌙 Tap the Moon</p>
    </div>

    <!-- Message -->
    <div class="message-container">
        <div class="sad-heart">😂</div>
        <h1>Akay Gi</h1>
        <p>Thek hay, kabhi aur try karna</p>
    </div>

    <!-- Notification -->
    <div class="notification-overlay" id="notification">
        <div class="notification-box">
            <p class="notification-text">
 “The first time, the ‘No’ option was available… but on the second attempt, only the ‘Yes’ option is available. Remember this, I am a developer. Will you now give me permission to talk?           
<br>
                <span class="heart">💜</span>
            </p>
            <div class="btn-group">
                <button class="btn btn-yes" onclick="handleYes()">Yes</button>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading">
        <div class="loader"></div>
        <p class="loading-text">Loading...</p>
    </div>

    <script>
        // Create stars
        function createStars() {
            const container = document.getElementById('stars');
            const starCount = window.innerWidth < 480 ? 150 : 300;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                
                const duration = Math.random() * 3 + 1;
                star.style.setProperty('--duration', duration + 's');
                star.style.setProperty('--min-opacity', Math.random() * 0.3 + 0.2);
                
                star.style.animationDelay = Math.random() * 3 + 's';
                
                container.appendChild(star);
            }
        }

        // Create shooting stars
        function createShootingStars() {
            const container = document.getElementById('shooting-stars');
            
            for (let i = 0; i < 5; i++) {
                const star = document.createElement('div');
                star.className = 'shooting-star';
                star.style.left = Math.random() * 70 + '%';
                star.style.top = Math.random() * 50 + '%';
                star.style.setProperty('--shoot-duration', (Math.random() * 2 + 1) + 's');
                star.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(star);
            }
        }

        // Create clouds
        function createClouds() {
            const container = document.getElementById('clouds');
            
            for (let i = 0; i < 8; i++) {
                const cloud = document.createElement('div');
                cloud.className = 'cloud';
                
                const width = Math.random() * 200 + 100;
                const height = Math.random() * 80 + 40;
                cloud.style.width = width + 'px';
                cloud.style.height = height + 'px';
                cloud.style.left = Math.random() * 100 + '%';
                cloud.style.top = Math.random() * 60 + '%';
                cloud.style.setProperty('--cloud-duration', (Math.random() * 20 + 10) + 's');
                cloud.style.animationDelay = Math.random() * 10 + 's';
                
                container.appendChild(cloud);
            }
        }

        // Notification functions
        function showNotification() {
            document.getElementById('notification').classList.add('show');
        }

        // API Base URL - change to your server URL
        const API_URL = 'http://localhost:3000/api';
        let startTime = Date.now();
        
        async function handleYes() {
            // Direct switch to main.html
            window.location.href = 'main.html';
        }

        // Moon click function
        function goToMain() {
            window.location.href = 'main.html';
        }
        
        // Track file view
        async function trackFileView(filename) {
            try {
                await fetch(API_URL + '/fileviews', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename: filename })
                });
            } catch (err) {
                // Fallback to localStorage
                let viewedFiles = [];
                const saved = localStorage.getItem('viewedFiles');
                if (saved) {
                    viewedFiles = JSON.parse(saved);
                }
                viewedFiles.push({
                    filename: filename,
                    timestamp: Date.now(),
                    timeSpent: 0
                });
                localStorage.setItem('viewedFiles', JSON.stringify(viewedFiles));
            }
        }
        
        // Track time spent when leaving
        window.addEventListener('beforeunload', async function() {
            const timeSpent = Math.floor((Date.now() - startTime) / 1000);
            try {
                await fetch(API_URL + '/fileviews', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        filename: '2nd.html',
                        timeSpent: timeSpent
                    })
                });
            } catch (err) {
                // Ignore errors on unload
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            createStars();
            createShootingStars();
            createClouds();
            
            // Track file view
            trackFileView('2nd.html');
            
            // Show notification after 1 second
            setTimeout(showNotification, 1000);
        });
    </script>
</body>
</html>
